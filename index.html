<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本をさがす</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Shippori+Mincho:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #faf8f4;
      --surface: #ffffff;
      --surface-alt: #f5f2ec;
      --border: #e0d8cc;
      --text-primary: #2c2416;
      --text-secondary: #7a6e5f;
      --text-muted: #b0a898;
      --accent: #7c4d2a;
      --accent-light: #c8895a;
      --accent-bg: #fdf3ea;
      --danger: #c0392b;
      --danger-bg: #fdf0ef;
      --tab-active: #7c4d2a;
      --shadow: 0 2px 8px rgba(44,36,22,0.10);
      --radius: 10px;
      --font-serif: 'Noto Serif JP', serif;
      --font-heading: 'Shippori Mincho', serif;
    }

    body {
      font-family: var(--font-serif);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px 12px;
      text-align: center;
    }
    header h1 {
      font-family: var(--font-heading);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      font-family: var(--font-serif);
      font-size: 0.9rem;
      color: var(--text-secondary);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      margin-bottom: -2px;
    }
    .tab-btn.active {
      color: var(--tab-active);
      border-bottom-color: var(--tab-active);
      font-weight: 700;
    }

    .tab-panel { display: none; flex: 1; flex-direction: column; }
    .tab-panel.active { display: flex; }

    main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── 検索タブ ── */
    .search-bar {
      padding: 16px 16px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .isbn-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .isbn-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--font-serif);
      font-size: 1rem;
      background: var(--bg);
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.15s;
    }
    .isbn-input:focus { border-color: var(--accent-light); }
    .isbn-input::placeholder { color: var(--text-muted); }

    .btn-icon {
      width: 44px; height: 44px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--accent);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      font-size: 1.2rem;
    }
    .btn-icon:hover { background: var(--accent-bg); border-color: var(--accent-light); }
    .btn-icon.scanning { background: var(--accent-bg); border-color: var(--accent); animation: pulse 1s infinite; }

    .btn-primary {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-serif);
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: #5e3720; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* カメラビューファインダー */
    #scanner-container {
      display: none;
      position: relative;
      background: #000;
      width: 100%;
      max-height: 260px;
      overflow: hidden;
    }
    #scanner-container.active { display: block; }
    #scanner-video {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      display: block;
    }
    .scanner-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .scanner-frame {
      width: 220px; height: 80px;
      border: 2.5px solid rgba(255,200,100,0.9);
      border-radius: 6px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.45);
    }
    .scanner-close {
      position: absolute;
      top: 10px; right: 10px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 32px; height: 32px;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    /* 検索結果 */
    .result-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .book-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }
    .book-inner {
      display: flex;
      gap: 14px;
    }
    .book-cover {
      flex-shrink: 0;
      width: 80px;
    }
    .book-cover img {
      width: 80px;
      min-height: 108px;
      border: 1px solid var(--border);
      border-radius: 4px;
      display: block;
      object-fit: cover;
    }
    .book-cover-placeholder {
      width: 80px;
      min-height: 108px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 1.8rem;
    }
    .book-meta { flex: 1; min-width: 0; }
    .book-title {
      font-family: var(--font-heading);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 4px;
    }
    .book-series {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }
    .book-author {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }
    .book-publisher {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .book-date {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .book-isbn-badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface-alt);
      border-radius: 4px;
      padding: 2px 7px;
      font-family: monospace;
    }

    .book-description {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-size: 0.88rem;
      line-height: 1.8;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-all;
    }
    .read-more-btn {
      background: none;
      border: none;
      color: var(--accent-light);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      font-family: var(--font-serif);
    }

    .fav-btn {
      margin-top: 14px;
      width: 100%;
      padding: 9px;
      border: 1.5px solid var(--accent-light);
      border-radius: var(--radius);
      background: none;
      color: var(--accent);
      font-family: var(--font-serif);
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .fav-btn:hover { background: var(--accent-bg); }
    .fav-btn.active { background: var(--accent-bg); font-weight: 700; }

    .state-msg {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 2;
    }
    .state-msg .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    .error-msg {
      text-align: center;
      padding: 32px 24px;
      color: var(--danger);
      font-size: 0.9rem;
    }

    /* ── 履歴・お気に入りタブ共通 ── */
    .list-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .list-title {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .btn-clear-all {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: var(--danger);
      cursor: pointer;
      font-family: var(--font-serif);
    }
    .btn-clear-all:hover { background: var(--danger-bg); }

    .book-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .book-list-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .book-list-item:hover { background: var(--accent-bg); }
    .book-list-thumb {
      width: 36px; height: 50px;
      object-fit: cover;
      border: 1px solid var(--border);
      border-radius: 3px;
      flex-shrink: 0;
    }
    .book-list-thumb-placeholder {
      width: 36px; height: 50px;
      background: var(--surface-alt);
      border: 1px solid var(--border);
      border-radius: 3px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; color: var(--text-muted);
    }
    .book-list-info { flex: 1; min-width: 0; }
    .book-list-title {
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .book-list-sub {
      font-size: 0.78rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .book-list-time {
      font-size: 0.75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .btn-delete-item {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
      flex-shrink: 0;
    }
    .btn-delete-item:hover { color: var(--danger); background: var(--danger-bg); }

    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <h1>本をさがす</h1>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="search">検索</button>
    <button class="tab-btn" data-tab="history">履歴</button>
    <button class="tab-btn" data-tab="favorites">お気に入り</button>
  </div>

  <main>
    <!-- 検索タブ -->
    <div class="tab-panel active" id="tab-search">
      <div class="search-bar">
        <div class="isbn-row">
          <input
            class="isbn-input"
            id="isbn-input"
            type="text"
            inputmode="numeric"
            placeholder="ISBN（10桁 / 13桁）"
            maxlength="17"
            autocomplete="off"
          >
          <button class="btn-icon" id="scan-btn" title="バーコードスキャン">&#128247;</button>
          <button class="btn-primary" id="search-btn">検索</button>
        </div>
      </div>

      <div id="scanner-container">
        <video id="scanner-video" autoplay muted playsinline></video>
        <div class="scanner-overlay">
          <div class="scanner-frame"></div>
        </div>
        <button class="scanner-close" id="scanner-close">&#10005;</button>
      </div>

      <div class="result-area" id="result-area">
        <div class="state-msg" id="initial-msg">
          <span class="icon">&#128218;</span>
          ISBNを入力するかバーコードを<br>スキャンして本を探してください
        </div>
      </div>
    </div>

    <!-- 履歴タブ -->
    <div class="tab-panel" id="tab-history">
      <div class="list-panel">
        <div class="list-header">
          <span class="list-title" id="history-count">0件</span>
          <button class="btn-clear-all" id="history-clear-all">すべて削除</button>
        </div>
        <div class="book-list" id="history-list"></div>
      </div>
    </div>

    <!-- お気に入りタブ -->
    <div class="tab-panel" id="tab-favorites">
      <div class="list-panel">
        <div class="list-header">
          <span class="list-title" id="favorites-count">0件</span>
          <button class="btn-clear-all" id="favorites-clear-all">すべて削除</button>
        </div>
        <div class="book-list" id="favorites-list"></div>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script>
  (() => {
    'use strict';

    // ── ストレージ ──────────────────────────────────────────────
    const HISTORY_KEY = 'honsagashi_history';
    const FAVORITES_KEY = 'honsagashi_favorites';
    const MAX_HISTORY = 50;

    function loadJSON(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key)) ?? fallback; }
      catch { return fallback; }
    }
    function saveJSON(key, val) {
      localStorage.setItem(key, JSON.stringify(val));
    }

    let history = loadJSON(HISTORY_KEY, []);   // [{isbn, data, ts}]
    let favorites = loadJSON(FAVORITES_KEY, []); // [{isbn, data, ts}]

    function saveHistory() { saveJSON(HISTORY_KEY, history); }
    function saveFavorites() { saveJSON(FAVORITES_KEY, favorites); }

    function addHistory(isbn, data) {
      history = history.filter(h => h.isbn !== isbn);
      history.unshift({ isbn, data, ts: Date.now() });
      if (history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
      saveHistory();
      renderHistory();
    }

    function removeHistory(isbn) {
      history = history.filter(h => h.isbn !== isbn);
      saveHistory();
      renderHistory();
    }

    function isFav(isbn) { return favorites.some(f => f.isbn === isbn); }

    function toggleFav(isbn, data) {
      if (isFav(isbn)) {
        favorites = favorites.filter(f => f.isbn !== isbn);
      } else {
        favorites.unshift({ isbn, data, ts: Date.now() });
      }
      saveFavorites();
      renderFavorites();
      updateFavBtn(isbn);
    }

    // ── タブ ────────────────────────────────────────────────────
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabPanels = document.querySelectorAll('.tab-panel');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;
        tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === target));
        tabPanels.forEach(p => p.classList.toggle('active', p.id === 'tab-' + target));
        if (target === 'history') renderHistory();
        if (target === 'favorites') renderFavorites();
      });
    });

    // ── 検索 ─────────────────────────────────────────────────────
    const isbnInput = document.getElementById('isbn-input');
    const searchBtn = document.getElementById('search-btn');
    const resultArea = document.getElementById('result-area');

    let currentBook = null;

    function normalizeISBN(raw) {
      return raw.replace(/[\s\-]/g, '');
    }

    function isValidISBN(s) {
      return /^\d{10}$|^\d{13}$/.test(s);
    }

    isbnInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });
    searchBtn.addEventListener('click', () => doSearch());

    async function doSearch(isbnOverride) {
      const raw = isbnOverride ?? isbnInput.value;
      const isbn = normalizeISBN(raw);

      if (!isValidISBN(isbn)) {
        showError('ISBNは10桁または13桁の数字で入力してください。');
        return;
      }

      showLoading();
      try {
        const res = await fetch(`https://api.openbd.jp/v1/get?isbn=${isbn}`);
        const json = await res.json();
        const item = json[0];
        if (!item) {
          showError('この本の情報が見つかりませんでした。');
          return;
        }
        currentBook = { isbn, data: item };
        addHistory(isbn, item);
        renderBookCard(isbn, item);
      } catch {
        showError('通信エラーが発生しました。接続を確認してください。');
      }
    }

    function showLoading() {
      resultArea.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
    }

    function showError(msg) {
      resultArea.innerHTML = `<div class="error-msg">${msg}</div>`;
    }

    function renderBookCard(isbn, item) {
      const s = item.summary ?? {};
      const onix = item.onix ?? {};
      const hanmoto = item.hanmoto ?? {};

      const title = s.title || '（書名不明）';
      const volume = s.volume ? `　${s.volume}` : '';
      const series = s.series || '';
      const author = s.author || '';
      const publisher = s.publisher || '';
      const pubdate = formatPubdate(s.pubdate || '');
      const cover = s.cover || '';

      const description = resolveDescription(onix, hanmoto);
      const favActive = isFav(isbn);

      resultArea.innerHTML = '';
      const card = document.createElement('div');
      card.className = 'book-card';

      const coverEl = cover
        ? `<img src="${cover}" alt="書影" loading="lazy" onerror="this.parentNode.innerHTML='<div class=\\"book-cover-placeholder\\">&#128218;</div>'">`
        : `<div class="book-cover-placeholder">&#128218;</div>`;

      card.innerHTML = `
        <div class="book-inner">
          <div class="book-cover">${coverEl}</div>
          <div class="book-meta">
            <div class="book-title">${esc(title + volume)}</div>
            ${series ? `<div class="book-series">${esc(series)}</div>` : ''}
            ${author ? `<div class="book-author">${esc(author)}</div>` : ''}
            ${publisher ? `<div class="book-publisher">${esc(publisher)}</div>` : ''}
            ${pubdate ? `<div class="book-date">${esc(pubdate)}</div>` : ''}
            <span class="book-isbn-badge">${esc(isbn)}</span>
          </div>
        </div>
        ${description ? renderDescription(description) : ''}
        <button class="fav-btn${favActive ? ' active' : ''}" id="fav-btn">
          ${favActive ? '★ お気に入りから削除' : '☆ お気に入りに追加'}
        </button>
      `;

      resultArea.appendChild(card);

      document.getElementById('fav-btn').addEventListener('click', () => {
        toggleFav(isbn, item);
      });

      // 続きを読む
      const readMoreBtn = card.querySelector('.read-more-btn');
      if (readMoreBtn) {
        readMoreBtn.addEventListener('click', () => {
          const short = card.querySelector('.desc-short');
          const full = card.querySelector('.desc-full');
          if (short) short.remove();
          if (full) full.style.display = '';
          readMoreBtn.remove();
        });
      }
    }

    function updateFavBtn(isbn) {
      const btn = document.getElementById('fav-btn');
      if (!btn || currentBook?.isbn !== isbn) return;
      const active = isFav(isbn);
      btn.className = 'fav-btn' + (active ? ' active' : '');
      btn.textContent = active ? '★ お気に入りから削除' : '☆ お気に入りに追加';
    }

    function renderDescription(text) {
      const LIMIT = 120;
      if (text.length <= LIMIT) {
        return `<div class="book-description">${esc(text)}</div>`;
      }
      const short = text.slice(0, LIMIT);
      return `
        <div class="book-description">
          <span class="desc-short">${esc(short)}…</span>
          <span class="desc-full" style="display:none">${esc(text)}</span>
          <button class="read-more-btn">続きを読む</button>
        </div>
      `;
    }

    function resolveDescription(onix, hanmoto) {
      // TextContent から TextType=03（本文説明）or 02 を探す
      try {
        const texts = onix.CollateralDetail?.TextContent ?? [];
        for (const tc of texts) {
          if (tc.Text) return tc.Text;
        }
      } catch {}
      if (hanmoto.kaisetsu105w) return hanmoto.kaisetsu105w;
      if (hanmoto.hanmotokarahitokoto) return hanmoto.hanmotokarahitokoto;
      return '';
    }

    function formatPubdate(s) {
      if (!s) return '';
      const m = s.replace(/\D/g, '');
      if (m.length >= 6) return `${m.slice(0,4)}年${m.slice(4,6)}月`;
      if (m.length === 4) return `${m}年`;
      return s;
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── バーコードスキャン ────────────────────────────────────────
    const scanBtn = document.getElementById('scan-btn');
    const scannerContainer = document.getElementById('scanner-container');
    const scannerVideo = document.getElementById('scanner-video');
    const scannerClose = document.getElementById('scanner-close');

    let codeReader = null;
    let scanning = false;

    scanBtn.addEventListener('click', () => {
      if (scanning) stopScanner();
      else startScanner();
    });
    scannerClose.addEventListener('click', stopScanner);

    async function startScanner() {
      if (!window.ZXing) {
        alert('ZXingライブラリの読み込みに失敗しました。');
        return;
      }

      // mediaDevices API が使えない環境（HTTP など）
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('カメラAPIが利用できません。\nHTTPS環境でお試しください。');
        return;
      }

      try {
          const allDevices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = allDevices.filter(d => d.kind === 'videoinput');

        if (videoDevices.length === 0) {
          alert('カメラが見つかりません。\nスマートフォンでお試しください。');
          return;
        }

        // EAN-13 に絞り、より粘り強く読むヒントを設定
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.EAN_13]);
        hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
        // 300ms ごとにスキャン（デフォルトは 500ms）
        codeReader = new ZXing.BrowserMultiFormatReader(hints, 300);

        // 背面カメラ優先
        const back = videoDevices.find(d =>
          /back|rear|environment/i.test(d.label)
        ) ?? videoDevices[videoDevices.length - 1];

        const deviceId = back?.deviceId;

        scannerContainer.classList.add('active');
        scanBtn.classList.add('scanning');
        scanning = true;

        // 高解像度リクエストでバーコード検出率を上げる
        const constraints = {
          video: deviceId
            ? { deviceId: { exact: deviceId }, width: { ideal: 1280 }, height: { ideal: 720 } }
            : { width: { ideal: 1280 }, height: { ideal: 720 } }
        };

        await codeReader.decodeFromConstraints(constraints, scannerVideo, (result, err) => {
          if (result) {
            const text = result.getText();
            if (/^97[89]\d{10}$/.test(text)) {
              stopScanner();
              isbnInput.value = text;
              doSearch(text);
            }
          }
        });
      } catch (e) {
        stopScanner();
        console.error('Camera error:', e.name, e.message);
        const name = e?.name ?? '';
        if (name === 'NotFoundError' || name === 'DevicesNotFoundError') {
          alert('カメラが見つかりません。\nスマートフォンでお試しください。');
        } else if (name === 'NotAllowedError' || name === 'PermissionDeniedError') {
          alert('カメラへのアクセスが拒否されました。\nブラウザの設定でカメラを許可してください。');
        } else if (name === 'NotReadableError') {
          alert('カメラが他のアプリに使用されています。\n他のアプリを閉じてから再試行してください。');
        } else {
          alert(`カメラを起動できませんでした。(${name || 'Unknown'})\nスマートフォンでお試しください。`);
        }
      }
    }

    function stopScanner() {
      if (codeReader) {
        codeReader.reset();
        codeReader = null;
      }
      scannerContainer.classList.remove('active');
      scanBtn.classList.remove('scanning');
      scanning = false;
    }

    // ── 履歴タブ ──────────────────────────────────────────────────
    const historyList = document.getElementById('history-list');
    const historyCount = document.getElementById('history-count');
    const historyClearAll = document.getElementById('history-clear-all');

    historyClearAll.addEventListener('click', () => {
      if (!confirm('履歴をすべて削除しますか？')) return;
      history = [];
      saveHistory();
      renderHistory();
    });

    function renderHistory() {
      historyCount.textContent = `${history.length}件`;
      if (!history.length) {
        historyList.innerHTML = '<div class="state-msg"><span class="icon">&#128218;</span>履歴はまだありません</div>';
        return;
      }
      historyList.innerHTML = '';
      for (const item of history) {
        historyList.appendChild(buildListItem(item, 'history'));
      }
    }

    // ── お気に入りタブ ─────────────────────────────────────────────
    const favoritesList = document.getElementById('favorites-list');
    const favoritesCount = document.getElementById('favorites-count');
    const favoritesClearAll = document.getElementById('favorites-clear-all');

    favoritesClearAll.addEventListener('click', () => {
      if (!confirm('お気に入りをすべて削除しますか？')) return;
      favorites = [];
      saveFavorites();
      renderFavorites();
    });

    function renderFavorites() {
      favoritesCount.textContent = `${favorites.length}件`;
      if (!favorites.length) {
        favoritesList.innerHTML = '<div class="state-msg"><span class="icon">&#9733;</span>お気に入りはまだありません</div>';
        return;
      }
      favoritesList.innerHTML = '';
      for (const item of favorites) {
        favoritesList.appendChild(buildListItem(item, 'favorites'));
      }
    }

    function buildListItem(item, kind) {
      const { isbn, data, ts } = item;
      const s = data.summary ?? {};
      const title = s.title || isbn;
      const author = s.author || s.publisher || '';
      const cover = s.cover || '';

      const el = document.createElement('div');
      el.className = 'book-list-item';

      const thumbEl = cover
        ? `<img class="book-list-thumb" src="${cover}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\"book-list-thumb-placeholder\\">&#128218;</div>'">`
        : `<div class="book-list-thumb-placeholder">&#128218;</div>`;

      el.innerHTML = `
        ${thumbEl}
        <div class="book-list-info">
          <div class="book-list-title">${esc(title)}</div>
          <div class="book-list-sub">${esc(author)}</div>
        </div>
        <span class="book-list-time">${timeAgo(ts)}</span>
        <button class="btn-delete-item" data-isbn="${esc(isbn)}" title="削除">&#10005;</button>
      `;

      // アイテムクリックで検索タブへ
      el.addEventListener('click', e => {
        if (e.target.classList.contains('btn-delete-item')) return;
        isbnInput.value = isbn;
        // 検索タブへ切り替え
        tabBtns.forEach(b => b.classList.toggle('active', b.dataset.tab === 'search'));
        tabPanels.forEach(p => p.classList.toggle('active', p.id === 'tab-search'));
        doSearch(isbn);
      });

      // 削除ボタン
      el.querySelector('.btn-delete-item').addEventListener('click', e => {
        e.stopPropagation();
        const targetIsbn = e.currentTarget.dataset.isbn;
        if (kind === 'history') removeHistory(targetIsbn);
        else {
          favorites = favorites.filter(f => f.isbn !== targetIsbn);
          saveFavorites();
          renderFavorites();
          updateFavBtn(targetIsbn);
        }
      });

      return el;
    }

    function timeAgo(ts) {
      const diff = Math.floor((Date.now() - ts) / 1000);
      if (diff < 60) return 'たった今';
      if (diff < 3600) return `${Math.floor(diff / 60)}分前`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}時間前`;
      return `${Math.floor(diff / 86400)}日前`;
    }

    // ── 初期レンダリング ──────────────────────────────────────────
    renderHistory();
    renderFavorites();
  })();
  </script>
</body>
</html>
